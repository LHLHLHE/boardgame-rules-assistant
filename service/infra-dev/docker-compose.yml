name: boardgame-rules-assistant-dev
services:
  postgres:
    image: postgres:17.7-alpine
    container_name: boardgame-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "$POSTGRES_DB", "-U", "$POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2.4-alpine
    container_name: boardgame-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: boardgame-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    deploy:
      resources:
        limits:
          memory: 2G

  minio:
    image: minio/minio:latest
    container_name: boardgame-minio
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  migrations:
    build:
      context: ../boardgame-rules-backend
      dockerfile: Dockerfile
    container_name: boardgame-migrations
    command: uv run alembic upgrade head
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ../boardgame-rules-backend
      dockerfile: Dockerfile
    container_name: boardgame-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "--max-time", "5", "http://127.0.0.1:8000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    env_file:
      - ./.env
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started

  celery:
    build:
      context: ../boardgame-rules-backend
      dockerfile: Dockerfile
    container_name: boardgame-celery
    command: uv run celery -A boardgame_rules_backend.tasks_app.celery:celery_app worker --loglevel=info
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      backend:
        condition: service_healthy

#  bot:
#    build:
#      context: ../boardgame-rules-bot
#      dockerfile: Dockerfile
#    container_name: boardgame-bot
#    restart: unless-stopped
#    env_file:
#      - ./.env
#    depends_on:
#      backend:
#        condition: service_healthy

  nginx:
    image: nginx:stable-alpine3.17-slim
    container_name: boardgame-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf
      - ../admin-panel/dist:/usr/share/nginx/html/admin:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_storage:
  minio_data:
