apiVersion: batch/v1
kind: Job
metadata:
  name: migrations
  namespace: boardgame-prod
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: migrations
    spec:
      restartPolicy: Never
      containers:
        - name: migrations
          image: boardgame-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - uv
            - run
            - alembic
            - upgrade
            - head
          envFrom:
            - configMapRef:
                name: boardgame-config
            - secretRef:
                name: boardgame-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
