name: boardgame-rules-assistant
services:
  postgres:
    image: postgres:17.7-alpine
    container_name: boardgame-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2.4-alpine
    container_name: boardgame-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: boardgame-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant_storage:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: boardgame-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data

  vllm-llm:
    image: vllm/vllm-openai:latest
    container_name: boardgame-vllm-llm
    restart: unless-stopped
    command:
      - --model
      - ${RAG_LLM__MODEL}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --generation-config
      - vllm
      - --gpu-memory-utilization
      - ${VLLM_LLM_GPU_MEMORY_UTILIZATION:-0.80}
      - --max-model-len
      - ${VLLM_LLM_MAX_MODEL_LEN:-24576}
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]

  vllm-embedding:
    image: vllm/vllm-openai:latest
    container_name: boardgame-vllm-embedding
    restart: unless-stopped
    command:
      - --model
      - ${RAG_EMBEDDING__MODEL}
      - --runner
      - pooling
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - ${VLLM_EMBEDDING_GPU_MEMORY_UTILIZATION:-0.10}
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]

  migrations:
    image: ${BACKEND_IMAGE}
    container_name: boardgame-migrations
    command: uv run alembic upgrade head
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    image: ${BACKEND_IMAGE}
    container_name: boardgame-backend
    restart: always
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "5", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      vllm-llm:
        condition: service_started
      vllm-embedding:
        condition: service_started

  celery:
    image: ${BACKEND_IMAGE}
    container_name: boardgame-celery
    command: uv run celery -A boardgame_rules_backend.tasks_app.celery:celery_app worker --loglevel=info
    restart: always
    env_file:
      - ./.env
    depends_on:
      backend:
        condition: service_healthy

  bot:
    image: ${BOT_IMAGE}
    container_name: boardgame-bot
    restart: always
    env_file:
      - ./.env
    depends_on:
      backend:
        condition: service_healthy

  admin-assets:
    image: ${ADMIN_FRONTEND_IMAGE}
    container_name: boardgame-admin-assets
    restart: no
    command: >
      /bin/sh -c "rm -rf /admin-dist/* && cp -a /usr/share/nginx/html/. /admin-dist/"
    volumes:
      - admin_dist:/admin-dist

  nginx:
    image: nginx:1.27-alpine
    container_name: boardgame-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot_www:/var/www/certbot
      - ./certbot_conf:/etc/letsencrypt
      - admin_dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
      bot:
        condition: service_started
      admin-assets:
        condition: service_completed_successfully

  certbot:
    image: certbot/certbot:latest
    container_name: boardgame-certbot
    restart: unless-stopped
    volumes:
      - ./certbot_www:/var/www/certbot
      - ./certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $$!; done"
    depends_on:
      nginx:
        condition: service_started

volumes:
  postgres_data:
  qdrant_storage:
  minio_data:
  vllm_cache:
  admin_dist:
