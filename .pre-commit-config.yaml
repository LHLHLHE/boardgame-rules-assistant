default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        files: ^service/.*\.py$
        additional_dependencies:
          - flake8-broken-line==1.0.0
          - flake8-builtins==3.1.0
          - flake8-docstrings==1.7.0
          - flake8-eradicate==1.5.0
          - flake8-isort==7.0.0
          - flake8-plugin-utils==1.3.3
          - flake8-return==1.2.0
          - flake8-variables-names==0.0.6

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^service/.*\.py$
        args: ["--filter-files"]

  - repo: local
    hooks:
      - id: eslint-admin-panel
        name: eslint admin-panel
        entry: bash -c 'cd service/admin-panel && args=(); for f in "$@"; do args+=("${f#service/admin-panel/}"); done; npx eslint "${args[@]}"' _
        language: system
        files: ^service/admin-panel/.*\.(ts|tsx|js|jsx)$
        pass_filenames: true
